# ============================================================================
# Maintainer's CI for this monorepo (GitHub Actions).
#
# This workflow is the MAINTAINER's release/PR-gate pipeline — it is not
# part of the shipped product. Consumers who fork registry
# wire CI in their own platform (Jenkins, GitLab CI, Buildkite, …) by
# invoking the same Make targets.
#
# The canonical command surface is the `Makefile` at the repo root. Every
# step below is either:
#   - A GitHub-Actions-specific operation (checkout, Python setup, DCO check), or
#   - A `make <target>` invocation that runs the same command any platform would.
# ============================================================================
name: ci

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'registry/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: registry/pyproject.toml
      - run: make install-dev
      - run: make lint
      - run: make format-check
      - run: make doc-refs

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: registry/pyproject.toml
      - run: make install-dev
      - run: make typecheck

  unit:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: registry/pyproject.toml
      - run: make install-dev
      - run: make test-unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: registry/pyproject.toml
      - run: make install-dev
      - run: make test-integration

  conformance:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: registry/pyproject.toml
      - run: make install-dev
      - run: make test-conformance

  # DCO check — every commit in the PR must carry a Signed-off-by: trailer
  # certifying the Developer Certificate of Origin v1.1. This is a
  # GitHub-Actions-specific operation; replicate it however your platform
  # of choice supports DCO verification.
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dco-org/dco-check@v1
