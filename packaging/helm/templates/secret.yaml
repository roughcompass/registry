{{- if or .Values.secrets.databaseUrl .Values.secrets.apiToken .Values.secrets.oidcDiscoveryUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "registry.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from storing secret values in release history in plain text.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.apiToken }}
  API_TOKEN: {{ .Values.secrets.apiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcDiscoveryUrl }}
  OIDC_DISCOVERY_URL: {{ .Values.secrets.oidcDiscoveryUrl | quote }}
  {{- end }}
{{- else }}
# Secret not rendered — provide secrets.databaseUrl, secrets.apiToken, and
# secrets.oidcDiscoveryUrl at install time (--set or external secret manager).
# Example using External Secrets Operator:
#   kubectl create secret generic registry \
#     --from-literal=DATABASE_URL=... \
#     --from-literal=API_TOKEN=...
{{- end }}
